<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智能农场视觉监测与数据管理平台 - 登录</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
<div class="login-wrapper">
    <div class="login-card">
        <h1 class="login-title">智能农场视觉监测与数据管理平台</h1>
        <p class="login-subtitle">请使用分配的账号登录系统</p>

        {% if form.errors %}
            <div class="login-error">用户名或密码错误，请重新输入。</div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="login-field">
                <label for="id_username">用户名</label>
                {{ form.username }}
            </div>
            <div class="login-field">
                <label for="id_password">密码</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary login-submit">登录</button>
        </form>

    </div>
</div>
</body>
</html>
